services:
  redis:
    image: redis:7-alpine
    container_name: ppi-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    command: >
      redis-server
      --requirepass ${REDIS_PASSWORD}
      --appendonly yes
      --maxmemory 256mb
      --maxmemory-policy allkeys-lru
      --tcp-keepalive 60
      --timeout 300
      --maxclients 100
      --save 60 1000
    volumes:
      - redis_data:/data
    networks:
      - ppi_network
    env_file:
      - .env
    healthcheck:
      test: ["CMD", "redis-cli", "--raw", "incr", "ping"]
      interval: 30s
      timeout: 3s
      retries: 5

  backend:
    build:
      context: .
      dockerfile: Dockerfile.dev
    container_name: ppi-backend
    ports:
      - "8000:8000"
    environment:
      - PYTHONPATH=/app
    env_file:
      - .env
    volumes:
      - .:/app
    restart: unless-stopped
    depends_on:
      redis:
        condition: service_healthy
    networks:
      - ppi_network

  notification_worker:
    build:
      context: .
      dockerfile: Dockerfile.dev
    container_name: ppi-notification-worker
    command: ["python", "-m", "app.worker.notification_worker"]
    env_file:
      - .env
    environment:
      - PYTHONPATH=/app
      - WORKER_BATCH_SIZE=20
      - WORKER_POLL_INTERVAL=5
    volumes:
      - .:/app
    restart: unless-stopped
    depends_on:
      redis:
        condition: service_healthy
      backend:
        condition: service_started
    networks:
      - ppi_network

  email_worker:
    build:
      context: .
      dockerfile: Dockerfile.dev
    container_name: ppi-email-worker
    command: ["python", "-m", "app.worker.email_worker"]
    env_file:
      - .env
    environment:
      - PYTHONPATH=/app
      - EMAIL_BATCH_SIZE=250
      - EMAIL_CONCURRENT_LIMIT=50
      - EMAIL_BATCH_DELAY=1.0
      - EMAIL_POLL_INTERVAL=2.0
    volumes:
      - .:/app
    restart: unless-stopped
    depends_on:
      redis:
        condition: service_healthy
      backend:
        condition: service_started
    networks:
      - ppi_network

volumes:
  redis_data:

networks:
  ppi_network:
    driver: bridge