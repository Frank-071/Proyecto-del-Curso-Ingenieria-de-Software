services:
  redis:
    image: redis:7-alpine
    container_name: ppi-redis-prod
    restart: always
    ports:
      - "6379:6379"
    command: >
      redis-server
      --requirepass ${REDIS_PASSWORD}
      --appendonly yes
      --maxmemory 512mb
      --maxmemory-policy allkeys-lru
      --tcp-keepalive 60
      --timeout 300
      --maxclients 100
      --save 60 1000
    volumes:
      - redis_data:/data
    networks:
      - ppi_network
    env_file:
      - .env
    healthcheck:
      test: ["CMD", "redis-cli", "--raw", "incr", "ping"]
      interval: 30s
      timeout: 3s
      retries: 5

  backend:
    build:
      context: .
      dockerfile: Dockerfile.prod
    container_name: ppi-backend-prod
    ports:
      - "8000:8000"
    environment:
      - PYTHONPATH=/app
      - GUNICORN_CMD_ARGS=--bind=0.0.0.0:8000 --workers=4 --timeout=120 --keep-alive=5
    env_file:
      - .env
    restart: always
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health', timeout=5)"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    depends_on:
      redis:
        condition: service_healthy
    networks:
      - ppi_network
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  notification_worker:
    build:
      context: .
      dockerfile: Dockerfile.prod
    container_name: ppi-notification-worker-prod
    command: ["python", "-m", "app.worker.notification_worker"]
    env_file:
      - .env
    environment:
      - PYTHONPATH=/app
      - WORKER_BATCH_SIZE=50
      - WORKER_POLL_INTERVAL=10
    restart: always
    depends_on:
      redis:
        condition: service_healthy
      backend:
        condition: service_healthy
    networks:
      - ppi_network
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  email_worker:
    build:
      context: .
      dockerfile: Dockerfile.prod
    container_name: ppi-email-worker-prod
    command: ["python", "-m", "app.worker.email_worker"]
    env_file:
      - .env
    environment:
      - PYTHONPATH=/app
      - EMAIL_BATCH_SIZE=250
      - EMAIL_CONCURRENT_LIMIT=50
      - EMAIL_BATCH_DELAY=1.0
      - EMAIL_POLL_INTERVAL=2.0
    restart: always
    depends_on:
      redis:
        condition: service_healthy
      backend:
        condition: service_healthy
    networks:
      - ppi_network
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

volumes:
  redis_data:

networks:
  ppi_network:
    driver: bridge